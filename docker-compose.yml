version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - starwhisper-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    depends_on:
      - redis
    networks:
      - starwhisper-net
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    depends_on:
      - redis
      - backend
    networks:
      - starwhisper-net
    command: celery -A backend.app.celery_worker worker --loglevel=info --concurrency=4

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - starwhisper-net
    command: npm run dev -- --host 0.0.0.0

networks:
  starwhisper-net:
    driver: bridge
